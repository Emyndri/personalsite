  <!-- Lightbox overlay -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer" aria-hidden="true">
    <button class="lightbox-btn lightbox-close" id="lightboxClose" aria-label="Close (Esc)">&times;</button>
    <button class="lightbox-btn lightbox-prev" id="lightboxPrev" aria-label="Previous photo (Left arrow)">&lsaquo;</button>
    <div class="lightbox-img-wrap">
      <img class="lightbox-img" id="lightboxImg" alt="" />
    </div>
    <button class="lightbox-btn lightbox-next" id="lightboxNext" aria-label="Next photo (Right arrow)">&rsaquo;</button>
    <div class="lightbox-counter" id="lightboxCounter">1 / 1</div>
  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // ---------- Lightbox ----------
    (function () {
      const photos = Array.from(document.querySelectorAll('.photo-grid .photo img'));
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const counter = document.getElementById('lightboxCounter');
      const closeBtn = document.getElementById('lightboxClose');
      const prevBtn = document.getElementById('lightboxPrev');
      const nextBtn = document.getElementById('lightboxNext');
      let currentIndex = 0;

      function show(index) {
        currentIndex = (index + photos.length) % photos.length;
        const img = photos[currentIndex];
        lightboxImg.src = img.src;
        lightboxImg.alt = img.alt || '';
        counter.textContent = (currentIndex + 1) + ' / ' + photos.length;
      }

      function open(index) {
        show(index);
        lightbox.classList.add('active');
        lightbox.setAttribute('aria-hidden', 'false');
        document.body.classList.add('lightbox-open');
      }

      function close() {
        lightbox.classList.remove('active');
        lightbox.setAttribute('aria-hidden', 'true');
        document.body.classList.remove('lightbox-open');
      }

      function next() { show(currentIndex + 1); }
      function prev() { show(currentIndex - 1); }

      photos.forEach((img, i) => {
        img.addEventListener('click', () => open(i));
      });

      closeBtn.addEventListener('click', close);
      nextBtn.addEventListener('click', (e) => { e.stopPropagation(); next(); });
      prevBtn.addEventListener('click', (e) => { e.stopPropagation(); prev(); });

      // Click on the dim backdrop closes — but not clicks on the image itself
      lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox || e.target.classList.contains('lightbox-img-wrap')) {
          close();
        }
      });

      // Keyboard navigation
      document.addEventListener('keydown', (e) => {
        if (!lightbox.classList.contains('active')) return;
        if (e.key === 'Escape') close();
        else if (e.key === 'ArrowRight') next();
        else if (e.key === 'ArrowLeft') prev();
      });

      // Touch swipe — left/right to navigate, down to close
      let touchStartX = 0, touchStartY = 0, touchActive = false;
      lightbox.addEventListener('touchstart', (e) => {
        if (e.touches.length !== 1) { touchActive = false; return; }
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        touchActive = true;
      }, { passive: true });

      lightbox.addEventListener('touchend', (e) => {
        if (!touchActive) return;
        touchActive = false;
        const t = e.changedTouches[0];
        const dx = t.clientX - touchStartX;
        const dy = t.clientY - touchStartY;
        const absX = Math.abs(dx);
        const absY = Math.abs(dy);
        const SWIPE_THRESHOLD = 40;
        if (absX > SWIPE_THRESHOLD && absX > absY) {
          if (dx < 0) next(); else prev();
        } else if (dy > SWIPE_THRESHOLD * 1.5 && absY > absX) {
          close();
        }
      }, { passive: true });
    })();
  </script>
